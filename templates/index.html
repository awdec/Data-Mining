<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codeforces 标签分析</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Codeforces tags Analysis</h1>

        {% if error %}
        <div class="alert error">
            {{ error }}
        </div>
        {% endif %}

        <form action="{{ url_for('analyze') }}" method="post">
            <div class="form-group">
                <label for="tag">选择标签：</label>
                <select id="tag" name="tag" required>
                    <option value="">-- 请选择 --</option>
                    {% for tag in tags %}
                    <option value="{{ tag }}">{{ tag }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="min_rating">最低分数：</label>
                <select id="min_rating" name="min_rating" required>
                    {% for rating in [800, 900, 1000, 1100, 1200, 1300, 1400, 1500, 1600, 1700, 1800, 1900, 2000, 2100, 2200, 2300, 2400, 2500, 2600, 2700, 2800, 2900, 3000, 3100, 3200, 3300, 3400, 3500] %}
                    <option value="{{ rating }}">{{ rating }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="max_rating">最高分数：</label>
                <select id="max_rating" name="max_rating" required>
                    {% for rating in [800, 900, 1000, 1100, 1200, 1300, 1400, 1500, 1600, 1700, 1800, 1900, 2000, 2100, 2200, 2300, 2400, 2500, 2600, 2700, 2800, 2900, 3000, 3100, 3200, 3300, 3400, 3500] %}
                    <option value="{{ rating }}">{{ rating }}</option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit">分析</button>
        </form>
    </div>

    <div class="container">
        <h1>Codeforces 标签分析</h1>

        {% if error %}
        <div class="alert error">
            {{ error }}
        </div>
        {% endif %}

        <form action="{{ url_for('analyze') }}" method="post">
            <!-- 当前的表单内容 -->
        </form>

        <form action="{{ url_for('percentage_analyze') }}" method="post" style="margin-top: 20px;">
            <h2>查看标签占比</h2>
            <div class="form-group">
                <label for="tag_percentage">选择标签：</label>
                <select id="tag_percentage" name="tag" required>
                    <option value="">-- 请选择 --</option>
                    {% for tag in tags %}
                    <option value="{{ tag }}">{{ tag }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="min_rating_percentage">最低分数：</label>
                <select id="min_rating_percentage" name="min_rating" required>
                    {% for rating in [800, 900, 1000, 1100, 1200, 1300, 1400, 1500, 1600, 1700, 1800, 1900, 2000, 2100, 2200, 2300, 2400, 2500, 2600, 2700, 2800, 2900, 3000, 3100, 3200, 3300, 3400, 3500] %}
                    <option value="{{ rating }}">{{ rating }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="max_rating_percentage">最高分数：</label>
                <select id="max_rating_percentage" name="max_rating" required>
                    {% for rating in [800, 900, 1000, 1100, 1200, 1300, 1400, 1500, 1600, 1700, 1800, 1900, 2000, 2100, 2200, 2300, 2400, 2500, 2600, 2700, 2800, 2900, 3000, 3100, 3200, 3300, 3400, 3500] %}
                    <option value="{{ rating }}">{{ rating }}</option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit">查看占比</button>
        </form>
    </div>
</body>
</html>
